name: Build macOS Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./ClawControl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ./ClawControl/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./ClawControl/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            release/*.dmg
            release/*.zip
