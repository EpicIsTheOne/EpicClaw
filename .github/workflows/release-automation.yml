name: Release Automation

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-assets:
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows, build-macos]
    if: |
      always() &&
      github.event_name == 'release' &&
      github.event.action == 'published'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: clawcontrol-release
          path: artifacts/android

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: artifacts/macos

      - name: List all artifacts
        run: |
          echo "=== Android APKs ===" && ls -lh artifacts/android/ || echo "No Android artifacts"
          echo "=== Linux binaries ===" && ls -lh artifacts/linux/ || echo "No Linux artifacts"
          echo "=== Windows binaries ===" && ls -lh artifacts/windows/ || echo "No Windows artifacts"
          echo "=== macOS binaries ===" && ls -lh artifacts/macos/ || echo "No macOS artifacts"

      - name: Upload all assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get tag from the release event
          TAG="${GITHUB_REF#refs/tags/}"

          echo "Uploading assets for release $TAG..."

          # Upload Android APK
          if [ -f artifacts/android/*.apk ]; then
            for apk in artifacts/android/*.apk; do
              gh release upload "$TAG" "$apk" --clobber
            done
          fi

          # Upload Linux binaries
          if [ -f artifacts/linux/*.AppImage ]; then
            for appimg in artifacts/linux/*.AppImage; do
              gh release upload "$TAG" "$appimg" --clobber
            done
          fi

          if [ -f artifacts/linux/*.deb ]; then
            for deb in artifacts/linux/*.deb; do
              gh release upload "$TAG" "$deb" --clobber
            done
          fi

          # Upload Windows binaries
          if [ -f artifacts/windows/*.exe ]; then
            for exe in artifacts/windows/*.exe; do
              gh release upload "$TAG" "$exe" --clobber
            done
          fi

          # Upload macOS binaries
          if [ -f artifacts/macos/*.dmg ]; then
            for dmg in artifacts/macos/*.dmg; do
              gh release upload "$TAG" "$dmg" --clobber
            done
          fi

          if [ -f artifacts/macos/*.zip ]; then
            for zip in artifacts/macos/*.zip; do
              gh release upload "$TAG" "$zip" --clobber
            done
          fi

          echo "All assets uploaded successfully!"
